<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mocchiri</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
    <meta name="google-site-verification" content="Rn4lj3Vb-ivyHjpCjZjyKE_o3n6di5Jo1bpZgQpkSNw" />        body {
            background-image: url('https://www.katebackdrop.jp/cdn/shop/products/BH1030747B.jpg?v=1646790283&width=1024');
            background-size: cover;
            background-attachment: fixed;
            color: #4a3b32;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 650px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #d2b48c;
            padding-bottom: 15px;
            margin-bottom: 20px;
            gap: 10px;
        }
        .header h1 { font-size: 24px; margin: 0; color: #8b5a2b; flex: 1; }
        
        .header-btns {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .profile-btn {
            text-decoration: none;
            background-color: #8b5a2b;
            padding: 8px 18px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            font-weight: bold;
        }
        
        .noti-btn {
            background-color: #ff9800;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
        }
        .noti-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: #ff4d4d;
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            border: 2px solid white;
        }

        .id-banner {
            padding: 10px;
            background-color: #fdf5e6;
            font-size: 13px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .tweet-box { margin-bottom: 25px; }
        .tweet-textarea {
            width: 100%;
            border: 2px solid #e6d7c3;
            border-radius: 12px;
            padding: 12px;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            background-color: #faf8f5;
        }
        .tweet-submit-btn {
            background-color: #8b5a2b;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            float: right;
        }
        .tweet-submit-btn:hover { background-color: #a06d3b; }
        .tweet-box::after { content: ""; display: block; clear: both; }
        
        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            border-bottom: 1px solid #e6d7c3;
            padding-bottom: 5px;
        }
        .tab-btn {
            background: none;
            border: none;
            font-size: 15px;
            padding: 5px 10px;
            cursor: pointer;
            color: #a08d75;
            font-weight: bold;
            outline: none;
        }
        .tab-btn.active {
            color: #8b5a2b;
            border-bottom: 3px solid #8b5a2b;
        }

        .tweet {
            background: #fffdfa;
            border: 1px solid #e6d7c3;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .tweet-header { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
        .user-name { font-weight: bold; color: #5c4033; cursor: pointer; }
        .user-name:hover { text-decoration: underline; }
        .user-id { color: #a08d75; font-size: 13px; cursor: pointer; }
        
        .follow-badge {
            background-color: #e1f5fe;
            color: #0288d1;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        .tweet-text { font-size: 15px; margin: 0 0 10px 0; white-space: pre-wrap; }
        
        .like-btn {
            background: none;
            border: none;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-weight: bold;
            padding: 0;
            margin-right: 15px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff4d4d;
            font-size: 13px;
            cursor: pointer;
            font-weight: bold;
            padding: 0;
            margin-left: auto;
        }
        .delete-btn:hover { text-decoration: underline; }
        
        .mention {
            color: #1d9bf0;
            font-weight: bold;
            cursor: pointer;
        }
        .mention:hover { text-decoration: underline; }

        .comment-area {
            margin-top: 12px;
            border-top: 1px dashed #e6d7c3;
            padding-top: 10px;
        }
        .comment-item {
            font-size: 14px;
            background: #fdfaf4;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            border-left: 3px solid #8b5a2b;
        }
        .comment-input-box {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .comment-input {
            flex: 1;
            border: 1px solid #e6d7c3;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 13px;
            outline: none;
            background-color: #fdfdfd;
        }
        .comment-submit-btn {
            background-color: #a08d75;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .dm-container {
            display: none;
            background: #fffdfa;
            border: 2px solid #8b5a2b;
            border-radius: 15px;
            padding: 20px;
            margin-top: 10px;
        }
        .dm-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e6d7c3;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .dm-back-btn {
            background-color: #a08d75;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 13px;
        }
        .dm-chat-box {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #e6d7c3;
            background: #faf8f5;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .dm-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-all;
        }
        .dm-bubble.me { background-color: #8b5a2b; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .dm-bubble.other { background-color: #e6d7c3; color: #4a3b32; align-self: flex-start; border-bottom-left-radius: 2px; }
        .dm-input-box { display: flex; gap: 10px; }

        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: #fffdfa;
            padding: 25px;
            border-radius: 20px;
            width: 85%;
            max-width: 400px;
            border: 3px solid #8b5a2b;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .close-btn {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #a08d75;
            font-weight: bold;
        }
        
        .noti-item {
            padding: 10px;
            border-bottom: 1px dashed #e6d7c3;
            font-size: 14px;
            line-height: 1.4;
        }
        .noti-item:last-child { border-bottom: none; }
        .noti-time { font-size: 11px; color: #a08d75; margin-top: 3px; }

        #modalName { margin: 0 0 5px 0; color: #5c4033; font-size: 22px; }
        #modalId { margin: 0 0 10px 0; color: #a08d75; font-size: 14px; }
        
        .btn-group { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .follow-toggle-btn { border: none; padding: 6px 15px; border-radius: 15px; font-size: 13px; font-weight: bold; cursor: pointer; outline: none; }
        .dm-open-btn { background-color: #25d366; color: white; border: none; padding: 6px 15px; border-radius: 15px; font-size: 13px; font-weight: bold; cursor: pointer; }

        #modalFollowersList {
            font-size: 12px;
            color: #705a4f;
            background: #f5edd6;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 10px;
            max-height: 80px;
            overflow-y: auto;
        }
        #modalBio { margin: 0; font-size: 15px; line-height: 1.5; background: #fdf5e6; padding: 12px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="mainView">
            <div class="header">
                <h1>mocchiri presented by mochimochi</h1>
                <div class="header-btns">
                    <button class="noti-btn" onclick="openNotiModal()">
                        通知センター
 <span id="notiCount" class="noti-badge" style="display:none;">0</span>
                    </button>
                    <a href="profile.html" class="profile-btn">プロフィール</a>
                </div>
            </div>
            <div class="id-banner">あなたの端末ID: <span id="myIdDisplay" style="font-weight: bold; color: #8b5a2b;"></span></div>
            
            <div class="tweet-box">
                <textarea id="tweetInput" class="tweet-textarea" placeholder="なにか書いてね..." rows="3"></textarea>
                <button onclick="sendTweet()" class="tweet-submit-btn">投稿する</button>
            </div>

            <div class="tabs">
                <button id="tabAll" class="tab-btn active" onclick="switchView('all')">すべての投稿</button>
                <button id="tabFollow" class="tab-btn" onclick="switchView('following')">フォロー中</button>
            </div>
            
            <div id="timeline"></div>
        </div>

        <div id="dmView" class="dm-container">
            <div class="dm-header">
                <h3 id="dmTargetTitle" style="margin:0; color:#8b5a2b;">〇〇さんとのDM</h3>
                <button onclick="closeDmView()" class="dm-back-btn">← 戻る</button>
            </div>
            <div id="dmChatBox" class="dm-chat-box"></div>
            <div class="dm-input-box">
                <input type="text" id="dmInput" class="comment-input" style="font-size:15px; padding:10px;" placeholder="メッセージを入力...">
                <button onclick="sendDm()" class="tweet-submit-btn" style="margin:0; padding:10px 20px;">送信</button>
            </div>
        </div>
    </div>

    <div id="profileModal" class="modal" onclick="closeModal('profileModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal('profileModal')">&times;</span>
            <h2 id="modalName">名前</h2>
            <div id="modalId">@ID</div>
            
            <div class="btn-group">
                <button id="modalFollowBtn" class="follow-toggle-btn" onclick="toggleFollow()"></button>
                <button id="modalDmBtn" class="dm-open-btn" onclick="openDmView()">💌 DMを送る</button>
            </div>

            <div id="modalFollowersList">フォロワーを読み込み中...</div>
            <p id="modalBio">ここに自己紹介が表示されます。</p>
        </div>
    </div>

    <div id="notiModal" class="modal" onclick="closeModal('notiModal')">
        <div class="modal-content" onclick="event.stopPropagation()" style="max-width: 450px;">
            <span class="close-btn" onclick="closeModal('notiModal')">&times;</span>
            <h2 style="margin: 0 0 15px 0; color: #8b5a2b; font-size: 20px;">🔔 通知box</h2>
            <div id="notiList" style="max-height: 350px; overflow-y: auto; background: #faf8f5; border-radius: 10px; border: 1px solid #e6d7c3; padding: 5px;">
                通知はありません。
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCoS1zXQxYgTKvArLZQBxPSFD4ykWPnUZ8",
          authDomain: "mocchiri-2b3a7.firebaseapp.com",
          projectId: "mocchiri-2b3a7",
          storageBucket: "mocchiri-2b3a7.firebasestorage.app",
          messagingSenderId: "830200088267",
          appId: "1:830200088267:web:5d8017b235da747c9e7d4e",
          measurementId: "G-BR4M3701SP"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let tabletId = localStorage.getItem("miniX_tabletId");
        if (!tabletId) {
            tabletId = "ID-" + Math.random().toString(36).substring(2, 8);
            localStorage.setItem("miniX_tabletId", tabletId);
        }
        document.getElementById("myIdDisplay").innerText = tabletId;

        let followingList = [];
        let currentView = "all";
        let lastSnapshot = null;
        let activeModalId = "";
        let activeModalName = "";
        let currentDmTargetId = "";

        db.collection("users").doc(tabletId).onSnapshot((doc) => {
            if (doc.exists) {
                followingList = doc.data().following || [];
            } else {
                followingList = [];
            }
            renderTimeline();
            if (document.getElementById("profileModal").style.display === "flex" && activeModalId) {
                showProfile(activeModalId);
            }
        });

        db.collection("notifications")
            .where("targetId", "==", tabletId)
            .onSnapshot((snapshot) => {
                let unreadCount = 0;
                const notiListDiv = document.getElementById("notiList");
                notiListDiv.innerHTML = "";

                let notiArray = [];
                snapshot.forEach((doc) => {
                    notiArray.push(doc.data());
                });

                notiArray.sort((a, b) => {
                    const timeA = a.createdAt ? a.createdAt.toDate() : 0;
                    const timeB = b.createdAt ? b.createdAt.toDate() : 0;
                    return timeB - timeA;
                });

                if (notiArray.length === 0) {
                    notiListDiv.innerHTML = "<div style='padding:15px; text-align:center; color:#a08d75;'>通知はまだありません。</div>";
                }

                notiArray.forEach((noti) => {
                    if (!noti.checked) unreadCount++;

                    const timeStr = noti.createdAt ? new Date(noti.createdAt.toDate()).toLocaleString('ja-JP', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'}) : "さっき";
                    
                    notiListDiv.innerHTML += `
                        <div class="noti-item" style="${!noti.checked ? 'background-color: #fffdf0; font-weight: bold;' : ''}">
                            <div>${noti.text}</div>
                            <div class="noti-time">${timeStr}</div>
                        </div>
                    `;
                });

                const badge = document.getElementById("notiCount");
                if (unreadCount > 0) {
                    badge.innerText = unreadCount;
                    badge.style.display = "inline-block";
                } else {
                    badge.style.display = "none";
                }
            });

        function addNotification(targetUserId, text) {
            if (targetUserId === tabletId) return;
            const myName = localStorage.getItem("miniX_name") || "名無しさん";
            db.collection("notifications").add({
                targetId: targetUserId,
                text: `👤 ${myName}さん: ${text}`,
                checked: false,
                createdAt: new Date()
            });
        }

        function openNotiModal() {
            document.getElementById("notiModal").style.display = "flex";
            
            db.collection("notifications")
                .where("targetId", "==", tabletId)
                .where("checked", "==", false)
                .get()
                .then((snapshot) => {
                    let batch = db.batch();
                    snapshot.forEach((doc) => {
                        batch.update(doc.ref, { checked: true });
                    });
                    batch.commit();
                });
        }

        function formatText(text) {
            let escaped = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            return escaped.replace(/@(ID-[a-z0-9]+)/g, '<span class="mention" onclick="showProfile(\'$1\')">@$1</span>');
        }

        function sendTweet() {
            const message = document.getElementById("tweetInput").value;
            if (message.trim() === "") return;
            const currentName = localStorage.getItem("miniX_name") || "名無しさん";
            db.collection("tweets").add({
                name: currentName,
                tabletId: tabletId,
                text: message,
                likes: [],
                comments: [],
                createdAt: new Date()
            });
            document.getElementById("tweetInput").value = "";
        }

        function deleteTweet(tweetId) {
            if (confirm("この投稿を削除しますか？")) {
                db.collection("tweets").doc(tweetId).delete();
            }
        }

        function toggleLike(tweetId, hasLiked, postUserTabletId) {
            const tweetRef = db.collection("tweets").doc(tweetId);
            if (hasLiked) {
                tweetRef.update({ likes: firebase.firestore.FieldValue.arrayRemove(tabletId) });
            } else {
                tweetRef.update({ likes: firebase.firestore.FieldValue.arrayUnion(tabletId) });
                addNotification(postUserTabletId, "あなたの投稿に「いいね❤️」しました。");
            }
        }

        function sendComment(tweetId, postUserTabletId) {
            const input = document.getElementById(`commentInput-${tweetId}`);
            const commentText = input.value;
            if (commentText.trim() === "") return;

            const currentName = localStorage.getItem("miniX_name") || "名無しさん";
            const tweetRef = db.collection("tweets").doc(tweetId);

            tweetRef.update({
                comments: firebase.firestore.FieldValue.arrayUnion({
                    name: currentName,
                    tabletId: tabletId,
                    text: commentText
                })
            });
            
            addNotification(postUserTabletId, `あなたの投稿に返信しました「${commentText.substring(0,10)}...」`);
            input.value = "";
        }

        function showProfile(targetId) {
            activeModalId = targetId;
            
            db.collection("users").doc(targetId).get().then((doc) => {
                if (doc.exists) {
                    const userData = doc.data();
                    activeModalName = userData.name || "名無しさん";
                    document.getElementById("modalName").innerText = activeModalName;
                    document.getElementById("modalBio").innerText = userData.bio || "自己紹介はまだありません。";
                } else {
                    activeModalName = "名無しさん";
                    document.getElementById("modalName").innerText = activeModalName;
                    document.getElementById("modalBio").innerText = "このユーザーはまだプロフィールを設定していません。";
                }
                document.getElementById("modalId").innerText = "@" + targetId;

                const followBtn = document.getElementById("modalFollowBtn");
                const dmBtn = document.getElementById("modalDmBtn");
                
                if (targetId === tabletId) {
                    followBtn.style.display = "none";
                    dmBtn.style.display = "none";
                } else {
                    followBtn.style.display = "inline-block";
                    dmBtn.style.display = "inline-block";
                    if (followingList.includes(targetId)) {
                        followBtn.innerText = "🙌 フォロー中 (解除する)";
                        followBtn.style.backgroundColor = "#a08d75";
                    } else {
                        followBtn.innerText = "👤 フォローする";
                        followBtn.style.backgroundColor = "#8b5a2b";
                    }
                    followBtn.style.color = "white";
                }
                document.getElementById("profileModal").style.display = "flex";
            });

            db.collection("users").where("following", "array-contains", targetId).get().then((snapshot) => {
                let followersNames = [];
                snapshot.forEach((uDoc) => {
                    followersNames.push(uDoc.data().name || `@${uDoc.id}`);
                });
                const listDiv = document.getElementById("modalFollowersList");
                if (followersNames.length > 0) {
                    listDiv.innerHTML = `<strong>フォロワー (${followersNames.length}人):</strong><br>` + followersNames.join(", ");
                } else {
                    listDiv.innerHTML = "<strong>フォロワー (0人):</strong><br>まだフォロワーはいません。";
                }
            });
        }

        function toggleFollow() {
            if (!activeModalId) return;
            const isFollowing = followingList.includes(activeModalId);
            const myUserRef = db.collection("users").doc(tabletId);
            
            const myName = localStorage.getItem("miniX_name") || "名無しさん";
            myUserRef.set({ name: myName }, { merge: true });

            if (isFollowing) {
                myUserRef.update({ following: firebase.firestore.FieldValue.arrayRemove(activeModalId) });
            } else {
                myUserRef.update({ following: firebase.firestore.FieldValue.arrayUnion(activeModalId) });
                addNotification(activeModalId, "あなたをフォローしました！");
            }
        }

        function openDmView() {
            currentDmTargetId = activeModalId;
            document.getElementById("dmTargetTitle").innerText = `💬 ${activeModalName} さんとのDM`;
            closeModal('profileModal');
            document.getElementById("mainView").style.display = "none";
            document.getElementById("dmView").style.display = "block";
            listenToDms();
        }

        function closeDmView() {
            document.getElementById("dmView").style.display = "none";
            document.getElementById("mainView").style.display = "block";
            currentDmTargetId = "";
            if(unsubDm) unsubDm();
        }

        function sendDm() {
            const input = document.getElementById("dmInput");
            const text = input.value;
            if (text.trim() === "" || !currentDmTargetId) return;

            db.collection("dms").add({
                participants: [tabletId, currentDmTargetId],
                senderId: tabletId,
                text: text,
                createdAt: new Date()
            });

            addNotification(currentDmTargetId, `あなたにDMを送りました「${text.substring(0,10)}...」`);
            input.value = "";
        }

        let unsubDm = null;
        function listenToDms() {
            if(unsubDm) unsubDm();
            unsubDm = db.collection("dms")
                .where("participants", "array-contains", tabletId)
                .onSnapshot((snapshot) => {
                    let dmList = [];
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        if(data.participants.includes(currentDmTargetId)) {
                            dmList.push(data);
                        }
                    });

                    dmList.sort((a, b) => {
                        const timeA = a.createdAt ? a.createdAt.toDate() : 0;
                        const timeB = b.createdAt ? b.createdAt.toDate() : 0;
                        return timeA - timeB;
                    });

                    const chatBox = document.getElementById("dmChatBox");
                    chatBox.innerHTML = "";
                    dmList.forEach((dm) => {
                        const isMe = (dm.senderId === tabletId);
                        const bubbleClass = isMe ? "me" : "other";
                        chatBox.innerHTML += `<div class="dm-bubble ${bubbleClass}">${formatText(dm.text)}</div>`;
                    });
                    chatBox.scrollTop = chatBox.scrollHeight;
                });
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = "none";
        }

        function switchView(view) {
            currentView = view;
            document.getElementById("tabAll").classList.toggle("active", view === "all");
            document.getElementById("tabFollow").classList.toggle("active", view === "following");
            renderTimeline();
        }

        function renderTimeline() {
            if (!lastSnapshot) return;
            const timelineDiv = document.getElementById("timeline");
            timelineDiv.innerHTML = "";

            lastSnapshot.forEach((doc) => {
                const tweet = doc.data();
                const displayName = tweet.name || "名無しさん";
                const displayId = tweet.tabletId || "なし";
                
                if (currentView === "following" && !followingList.includes(displayId) && displayId !== tabletId) {
                    return;
                }

                const likes = tweet.likes || [];
                const likeCount = likes.length;
                const hasLiked = likes.includes(tabletId);
                const likeHeart = hasLiked ? "❤️" : "♡";
                const likeColor = hasLiked ? "#e0245e" : "#a08d75";

                const isFollowing = followingList.includes(displayId);
                const followBadge = isFollowing ? `<span class="follow-badge">フォロー中</span>` : "";

                const deleteBtnHtml = (displayId === tabletId) ? `<button class="delete-btn" onclick="deleteTweet('${doc.id}')">削除</button>` : "";

                const comments = tweet.comments || [];
                let commentsHtml = "";
                comments.forEach((c) => {
                    const cFollowing = followingList.includes(c.tabletId);
                    const cBadge = cFollowing ? `<span class="follow-badge" style="font-size:10px; padding:1px 5px;">フォロー中</span>` : "";
                    commentsHtml += `
                        <div class="comment-item">
                            <span class="user-name" style="font-size:13px;" onclick="showProfile('${c.tabletId}')">${c.name}</span>
                            <span class="user-id" style="font-size:11px;" onclick="showProfile('${c.tabletId}')">@${c.tabletId}</span>
                            ${cBadge}
                            <p style="margin:4px 0 0 0; font-size:14px;">${formatText(c.text)}</p>
                        </div>
                    `;
                });

                timelineDiv.innerHTML += `
                    <div class="tweet">
                        <div class="tweet-header">
                            <span class="user-name" onclick="showProfile('${displayId}')">${displayName}</span>
                            <span class="user-id" onclick="showProfile('${displayId}')">@${displayId}</span>
                            ${followBadge}
                            ${deleteBtnHtml}
                        </div>
                        <p class="tweet-text">${formatText(tweet.text)}</p>
                        
                        <div style="display:flex; align-items:center;">
                            <button class="like-btn" style="color: ${likeColor};" onclick="toggleLike('${doc.id}', ${hasLiked}, '${displayId}')">
                                ${likeHeart} <span>${likeCount}</span>
                            </button>
                        </div>

                        <div class="comment-area">
                            <div class="comment-list">${commentsHtml}</div>
                            <div class="comment-input-box">
                                <input type="text" id="commentInput-${doc.id}" class="comment-input" placeholder="返信を書き込む...">
                                <button class="comment-submit-btn" onclick="sendComment('${doc.id}', '${displayId}')">返信</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        db.collection("tweets").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            lastSnapshot = snapshot;
            renderTimeline();
        });
    </script>
</body>
</html>
