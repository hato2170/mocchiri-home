<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロフィール編集 - もっちり掲示板</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1541123437800-1bb1317badc2?q=80&w=1200');
            background-size: cover;
            background-attachment: fixed;
            color: #4a3b32;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #d2b48c;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 20px; margin: 0; color: #8b5a2b; }
        
        .back-btn {
            text-decoration: none;
            background-color: #a08d75;
            padding: 6px 15px;
            border-radius: 15px;
            color: white;
            font-size: 13px;
            font-weight: bold;
        }

        .id-banner {
            padding: 10px;
            background-color: #fdf5e6;
            font-size: 13px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #8b5a2b;
            text-align: center;
        }

        .avatar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }
        .avatar-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #8b5a2b;
            background-color: #e6d7c3;
            margin-bottom: 10px;
        }
        .file-input-btn {
            background-color: #a08d75;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
            color: #5c4033;
        }
        .input-field {
            width: 100%;
            border: 2px solid #e6d7c3;
            border-radius: 10px;
            padding: 10px;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            background-color: #faf8f5;
        }
        .input-field:focus {
            border-color: #8b5a2b;
        }

        .save-btn {
            width: 100%;
            background-color: #8b5a2b;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .save-btn:hover {
            background-color: #a06d3b;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>👤 プロフィール設定</h1>
            <a href="index.html" class="back-btn">← 戻る</a>
        </div>

        <div class="id-banner">あなたのID: <span id="myIdDisplay"></span></div>

        <div class="avatar-container">
            <img id="avatarPreview" class="avatar-preview" src="https://placehold.co/100x100/e6d7c3/4a3b32?text=👤" alt="icon">
            <label class="file-input-btn">
                📁 写真をえらぶ
                <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="previewImage(this)">
            </label>
        </div>

        <div class="form-group">
            <label for="nameInput">お名前（ニックネーム）</label>
            <input type="text" id="nameInput" class="input-field" placeholder="名無しさん">
        </div>

        <div class="form-group">
            <label for="bioInput">自己紹介</label>
            <textarea id="bioInput" class="input-field" rows="4" placeholder="趣味や一言を書いてね！"></textarea>
        </div>

        <button onclick="saveProfile()" class="save-btn" id="saveBtn">変更を保存する</button>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCoS1zXQxYgTKvArLZQBxPSFD4ykWPnUZ8",
          authDomain: "mocchiri-2b3a7.firebaseapp.com",
          projectId: "mocchiri-2b3a7",
          storageBucket: "mocchiri-2b3a7.firebasestorage.app",
          messagingSenderId: "830200088267",
          appId: "1:830200088267:web:5d8017b235da747c9e7d4e",
          measurementId: "G-BR4M3701SP"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let tabletId = localStorage.getItem("miniX_tabletId");
        if (!tabletId) {
            tabletId = "ID-" + Math.random().toString(36).substring(2, 8);
            localStorage.setItem("miniX_tabletId", tabletId);
        }
        document.getElementById("myIdDisplay").innerText = "@" + tabletId;

        let base64ImageData = ""; // 画像の文字データを入れる変数

        // 最初データの読み込み
        db.collection("users").doc(tabletId).get().then((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.name) document.getElementById("nameInput").value = data.name;
                if (data.bio) document.getElementById("bioInput").value = data.bio;
                if (data.avatarUrl) {
                    base64ImageData = data.avatarUrl;
                    document.getElementById("avatarPreview").src = data.avatarUrl;
                }
            }
        });

        // 写真フォルダから選ばれた画像を画面に表示して、文字データに変換する
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                
                // ⚠️ 画像が大きすぎると保存できないので少し圧縮する処理
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement("canvas");
                        const ctx = canvas.getContext("2d");
                        // 100x100のアイコンサイズにリサイズ
                        canvas.width = 100;
                        canvas.height = 100;
                        ctx.drawImage(img, 0, 0, 100, 100);
                        
                        // 圧縮した画像データを保存用変数に入れる
                        base64ImageData = canvas.toDataURL("image/jpeg", 0.7);
                        document.getElementById("avatarPreview").src = base64ImageData;
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        // 保存ボタン
        function saveProfile() {
            const saveBtn = document.getElementById("saveBtn");
            const nameInput = document.getElementById("nameInput").value.trim() || "名無しさん";
            const bioInput = document.getElementById("bioInput").value.trim();

            saveBtn.innerText = "保存中...";
            saveBtn.disabled = true;

            // スマホとFirestoreに保存（Storageは使わない！）
            localStorage.setItem("miniX_name", nameInput);
            if (base64ImageData) {
                localStorage.setItem("miniX_avatarUrl", base64ImageData);
            }

            db.collection("users").doc(tabletId).set({
                name: nameInput,
                bio: bioInput,
                avatarUrl: base64ImageData
            }, { merge: true })
            .then(() => {
                alert("プロフィールを保存しました！🌳");
                window.location.href = "index.html";
            })
            .catch((error) => {
                console.error("エラー:", error);
                alert("保存に失敗しました。");
                saveBtn.innerText = "変更を保存する";
                saveBtn.disabled = false;
            });
        }
    </script>
</body>
</html>
